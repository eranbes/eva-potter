# Production Docker Compose for Eva Potter
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: eva-potter
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - eva-potter-data:/app/data
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  eva-potter-data:
